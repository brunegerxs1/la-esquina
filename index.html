<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>La Esquina</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <img src="logo.png" class="logo">
    </div>

  <h1>Nuestro Catálogo</h1>
  <p class="subtitulo">Comida casera y saludable</p>

  <div class="contenedor">

    <div class="producto">
      <img src="milanesas.jpg" class="img">
      <h3>Milanesas de soja</h3>

      <div class="variedad-fila">
          <p class="sub">Clásicas</p>
          <span class="precio-item">$1000</span>
      </div>
      <ul>
        <li>Tradicional</li>
      </ul>

      <div class="variedad-fila">
          <p class="sub">Rellenas</p>
          <span class="precio-item">$1200</span>
      </div>
      <ul>
        <li>Jamón y queso / Verdura</li>
      </ul>
    </div>

    <div class="producto">
      <img src="tartas.jpg" class="img">
      <h3>Tartas</h3>
      
      <div class="variedad-fila">
          <p class="sub">Variedades</p>
          <span class="precio-item">$1500</span>
      </div>
      <ul>
        <li>Jamón y queso</li>
        <li>Verdura</li>
        <li>Pollo</li>
      </ul>
    </div>

    <div class="producto">
      <img src="prepizza.jpg" class="img">
      <h3>Prepizzas</h3>

      <div class="variedad-fila">
          <p class="sub">Integrales / Pizzetas</p>
          <span class="precio-item">$800</span>
      </div>
      <ul>
        <li>Integrales</li>
        <li>Pizzetas</li>
      </ul>
    </div>

  </div>
</body>
</html>
